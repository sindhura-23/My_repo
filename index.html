<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Yallu 🎂</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    font-family:Arial, sans-serif;

    background:
    linear-gradient(
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.45)),

    url('Snapchat-1803626967.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:15px;
}

/* Floating Sparkles */

.sparkle{

    position:absolute;

    width:4px;
    height:4px;

    background:white;

    border-radius:50%;

    animation:twinkle 3s infinite;
}

.sparkle:nth-child(1){
    top:10%;
    left:20%;
    animation-delay:0s;
}

.sparkle:nth-child(2){
    top:20%;
    left:80%;
    animation-delay:1s;
}

.sparkle:nth-child(3){
    top:70%;
    left:15%;
    animation-delay:2s;
}

.sparkle:nth-child(4){
    top:80%;
    left:75%;
    animation-delay:1.5s;
}

.sparkle:nth-child(5){
    top:50%;
    left:50%;
    animation-delay:0.5s;
}

@keyframes twinkle{

    0%{
        opacity:0.2;
        transform:scale(1);
    }

    50%{
        opacity:1;
        transform:scale(3);
        box-shadow:0 0 20px white;
    }

    100%{
        opacity:0.2;
        transform:scale(1);
    }
}

/* Message Box */

.message{

    position:relative;
    z-index:2;

    width:100%;
    max-width:500px;

    text-align:center;

    padding:25px;

    border-radius:25px;

    background:rgba(0,0,0,0.15);

    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* Birthday Text */

.birthday-text{

    display:flex;
    flex-direction:column;

    gap:12px;
}

.birthday-text span{

    opacity:0;

    font-size:45px;

    font-weight:bold;

    color:red;

    text-shadow:
    0 0 10px red,
    0 0 20px red,
    0 0 40px white;

    animation:
    popUp 1.2s forwards,
    glow 1.5s infinite alternate;
}

.birthday-text span:nth-child(1){
    animation-delay:0s;
}

.birthday-text span:nth-child(2){
    animation-delay:1.5s;
}

.birthday-text span:nth-child(3){
    animation-delay:3s;
}

/* Pop Animation */

@keyframes popUp{

    0%{
        opacity:0;
        transform:scale(0.3);
    }

    70%{
        opacity:1;
        transform:scale(1.2);
    }

    100%{
        opacity:1;
        transform:scale(1);
    }
}

/* Glow */

@keyframes glow{

    from{
        text-shadow:
        0 0 10px red,
        0 0 20px red;
    }

    to{
        text-shadow:
        0 0 20px white,
        0 0 40px red,
        0 0 60px red;
    }
}

/* Paragraph */

p{

    color:white;

    font-size:18px;

    line-height:1.7;

    margin-top:18px;

    text-shadow:0 0 10px black;
}

/* Love Text */

.love{

    margin-top:20px;

    color:#ffd6eb;

    font-size:24px;

    font-weight:bold;

    text-shadow:0 0 10px black;
}

/* Firecracker */

.firecracker{

    position:absolute;

    width:12px;
    height:12px;

    border-radius:50%;

    background:white;

    pointer-events:none;

    animation:explode 1s ease-out forwards;
}

@keyframes explode{

    0%{

        transform:scale(1);

        opacity:1;

        box-shadow:
        0 0 10px white,
        0 0 20px yellow,
        0 0 40px pink;
    }

    100%{

        transform:scale(18);

        opacity:0;

        box-shadow:
        0 0 50px white,
        0 0 80px yellow,
        0 0 120px pink;
    }
}

/* Mobile */

@media(max-width:600px){

    .birthday-text span{
        font-size:34px;
    }

    p{
        font-size:16px;
    }

    .love{
        font-size:22px;
    }
}

</style>
</head>

<body>

<!-- Sparkles -->

<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>

<!-- Message -->

<div class="message">

    <div class="birthday-text">

        <span>Happy ✨</span>

        <span>Birthday 🥂🍫✨</span>

        <span>My Dear Sweet ♥️</span>

    </div>

    <p>
        You are my best friend,<br>
        my support and my forever happiness ❤️
    </p>

    <p>
        Thank you for filling my life
        with love, laughter and beautiful memories ✨
    </p>

    <p>
        You will always be my favorite person forever 💕
    </p>

    <div class="love">
        Love You Endless ✨🌸♥️
    </div>

</div>

<script>

document.addEventListener("click", function(e){

    let blast = document.createElement("div");

    blast.className = "firecracker";

    blast.style.left = e.pageX + "px";

    blast.style.top = e.pageY + "px";

    document.body.appendChild(blast);

    setTimeout(() => {
        blast.remove();
    },1000);

});

</script>

</body>
</html>
