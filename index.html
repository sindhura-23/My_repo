<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Yallu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    font-family:Arial, sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.65),
    rgba(0,0,0,0.65)),

    url('Snapchat-1803626967.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:15px;
}

/* Message Box */

.message{

    position:relative;
    z-index:2;

    width:100%;
    max-width:500px;

    text-align:center;

    padding:25px;

    border-radius:25px;

    background:rgba(0,0,0,0.35);

    backdrop-filter:blur(5px);

    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* Animated Birthday Text */

.birthday-text{

    display:flex;
    flex-direction:column;

    gap:12px;
}

.birthday-text span{

    opacity:0;

    font-size:40px;

    font-weight:bold;

    color:#ff66b2;

    text-shadow:
    0 0 10px #ff66b2,
    0 0 20px #ff66b2,
    0 0 40px white;

    animation:
    showWords 1.5s forwards,
    sparkle 1.5s infinite alternate;
}

.birthday-text span:nth-child(1){
    animation-delay:0s;
}

.birthday-text span:nth-child(2){
    animation-delay:1.5s;
}

.birthday-text span:nth-child(3){
    animation-delay:3s;
}

@keyframes showWords{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes sparkle{

    from{
        text-shadow:
        0 0 10px #ff66b2,
        0 0 20px #ff66b2;
    }

    to{
        text-shadow:
        0 0 20px white,
        0 0 40px #ff66b2,
        0 0 60px white;
    }
}

/* Paragraph */

p{

    color:white;

    font-size:18px;

    line-height:1.7;

    margin-top:18px;
}

/* Love Text */

.love{

    margin-top:20px;

    color:#ffd6eb;

    font-size:24px;

    font-weight:bold;
}

/* Blast Effect */

.firecracker{

    position:absolute;

    width:12px;
    height:12px;

    border-radius:50%;

    background:white;

    pointer-events:none;

    animation:explode 1s ease-out forwards;
}

@keyframes explode{

    0%{
        transform:scale(1);
        opacity:1;

        box-shadow:
        0 0 10px white,
        0 0 20px yellow,
        0 0 40px pink;
    }

    100%{
        transform:scale(18);
        opacity:0;

        box-shadow:
        0 0 50px white,
        0 0 80px yellow,
        0 0 120px pink;
    }
}

/* Mobile */

@media(max-width:600px){

    .birthday-text span{
        font-size:32px;
    }

    p{
        font-size:16px;
    }

    .love{
        font-size:22px;
    }
}

</style>
</head>

<body>

<div class="message">

    <div class="birthday-text">

        <span>Happy ✨</span>

        <span>Birthday 🎂</span>

        <span> My dear sweet ♥️</span>

    </div>

    <p>
        You are my best friend,<br>
        my support and my forever happiness ❤️
    </p>

    <p>
        Thank you for filling my life
        with love, laughter and beautiful memories ✨
    </p>

    <p>
        You will always be my favorite person forever 💕
    </p>

    <div class="love">
        Love You Endless 💖
    </div>

</div>

<script>

document.addEventListener("click", function(e){

    let blast = document.createElement("div");

    blast.className = "firecracker";

    blast.style.left = e.pageX + "px";

    blast.style.top = e.pageY + "px";

    document.body.appendChild(blast);

    setTimeout(() => {
        blast.remove();
    },1000);

});

</script>

</body>
</html>
